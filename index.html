<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WALLET APP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <div class="both">
        <div class="login">
          <div class="username">
            <div class="blueOne"></div>
            <div class="icon-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
              >
                <rect x="3" y="5" width="18" height="14" rx="2" />
                <path d="M3 6.5 12 13 21 6.5" />
              </svg>
            </div>
            <div class="blueOnee"></div>
            <input
              class="teeext usernamein"
              type="text"
              placeholder="Input your user ID or Email"
            />
          </div>
          <div class="password">
            <div class="blueTwo"></div>
            <div class="icon-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
              >
                <circle cx="8" cy="8" r="4.5" />
                <path d="M11.3 11.3 20 20M15.5 15.5 18 13M18 18l2-2" />
              </svg>
            </div>
            <div class="blueTwoo"></div>
            <input
              class="teeext passwordin"
              type="text"
              placeholder="Input your password "
            />
          </div>
          <div class="options-row">
            <label class="remember-me">
              <input type="checkbox" checked />
              <span class="checkbox-box">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="white"
                  stroke-width="3"
                >
                  <path d="M4 12.5 9.5 18 20 6" />
                </svg>
              </span>
              Remember me
            </label>

            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>
          <a href="main.html">
            <button class="login-btn" type="button">
              <span>
                <svg viewBox="0 0 24 24" stroke-width="2">
                  <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"></path>
                  <path d="M10 17l5-5-5-5"></path>
                  <path d="M15 12H3"></path>
                </svg>
              </span>
              <span>LOG IN</span>
            </button>
          </a>
        </div>
        <div class="welcoming"><span class="welcome">WELCOME BACK!</span></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
